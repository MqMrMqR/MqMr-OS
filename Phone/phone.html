<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MqMr's OS | Phone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="phone.css" />
</head>
<body>

  <main class="phone-app">

    <!-- ===== ABOUT ===== -->
<section class="card about-card">

  <div class="avatar-ring">
    <img id="about-avatar" src="" alt="MqMr avatar" />
  </div>

  <h1 class="about-name" id="about-name"></h1>
  <p class="about-subtitle" id="about-subtitle"></p>

  <p class="about-desc" id="about-description"></p>

  <div class="socials">
    <button id="about-instagram-btn" class="ig">Instagram</button>
    <button id="about-discord-btn" class="dc">Discord</button>
    <button id="about-x-btn" class="x">X</button>
    <button id="about-youtube-btn" class="yt">YouTube</button>
  </div>

</section>

    <!-- ===== PROJECTS ===== -->
<section class="card projects-card">
  <div class="projects-simple">
    <div class="card-header">
      <h2 class="card-title" id="projects-section-title"></h2>
      <p class="card-tagline" id="projects-section-subtitle"></p>
    </div>

    <div class="projects-content">
      <div class="project-list" id="projects-list"></div>
    </div>
  </div>
</section>

    <!-- ===== CONTACT ===== -->
<section class="card contact-card">

  <header>
    <h2 id="contact-app-title"></h2>
    <p class="muted" id="contact-app-subtitle"></p>
  </header>

  <form class="contact-form" onsubmit="return handlePhoneContactSubmit(event)">

    <div class="contact-field">
      <label id="contact-name-label" for="contact-name"></label>
      <input id="contact-name" type="text" name="contact-name" required />
    </div>

    <div class="contact-field">
      <label id="contact-phone-label" for="contact-phone"></label>
      <input id="contact-phone" type="text" name="contact-phone" />
    </div>

    <div class="contact-field">
      <label id="contact-subject-label" for="contact-subject"></label>
      <input id="contact-subject" type="text" name="contact-subject" required />
    </div>

    <div class="contact-field">
      <label id="contact-message-label" for="contact-message"></label>
      <textarea id="contact-message" name="contact-message" rows="4" required></textarea>
    </div>

    <button type="submit" class="contact-submit">
      <span id="contact-submit-icon">✈️</span>
      <span id="contact-submit-text">Send Message</span>
    </button>

  </form>

</section>

  </main>

  <script src="phone.js"></script>
</body>
</html>
